apiVersion: apps/v1
kind: Deployment
metadata:
  name: amazon-worker
  namespace: amz-sif-crawler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: amazon-worker
  template:
    metadata:
      labels:
        app: amazon-worker
    spec:
      containers:
        - name: amazon-worker
          image: amz-sif-crawler-amazon-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["bash", "/app/scripts/worker_entrypoint.sh"]
          envFrom:
            - configMapRef:
                name: amz-sif-crawler-config
          env:
            - name: NODE_TYPE
              value: "amazon"
            - name: PORT
              value: "8000"
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: amazon-profile-seed
              mountPath: /app/profiles/amazon
              readOnly: true
            - name: amazon-cache
              mountPath: /app/cache_db
      volumes:
        - name: amazon-profile-seed
          persistentVolumeClaim:
            claimName: amazon-profile-pvc
        - name: amazon-cache
          persistentVolumeClaim:
            claimName: amazon-cache-pvc
