apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: amz-sif-crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      containers:
        - name: mcp-gateway
          image: amz-sif-crawler-mcp-gateway:latest
          imagePullPolicy: IfNotPresent
          command: ["python3", "mcp_gateway.py"]
          envFrom:
            - configMapRef:
                name: amz-sif-crawler-config
          ports:
            - containerPort: 8888
              name: http
          readinessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
