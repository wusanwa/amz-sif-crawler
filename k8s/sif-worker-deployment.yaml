apiVersion: apps/v1
kind: Deployment
metadata:
  name: sif-worker
  namespace: amz-sif-crawler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sif-worker
  template:
    metadata:
      labels:
        app: sif-worker
    spec:
      containers:
        - name: sif-worker
          image: amz-sif-crawler-sif-worker:latest
          imagePullPolicy: IfNotPresent
          command: ["bash", "/app/scripts/worker_entrypoint.sh"]
          envFrom:
            - configMapRef:
                name: amz-sif-crawler-config
          env:
            - name: NODE_TYPE
              value: "sif"
            - name: PORT
              value: "8000"
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: sif-profile-seed
              mountPath: /app/profiles/sif
              readOnly: true
            - name: sif-cache
              mountPath: /app/cache_db
      volumes:
        - name: sif-profile-seed
          persistentVolumeClaim:
            claimName: sif-profile-pvc
        - name: sif-cache
          persistentVolumeClaim:
            claimName: sif-cache-pvc
